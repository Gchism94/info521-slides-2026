<!--
  INFO 521 color system — raw <style> injected into <head> via include-in-header.
  Kept OUT of the SCSS pipeline on purpose: Quarto's CSS minifier inlines custom
  properties and strips [data-theme="light"] overrides, which would break the
  runtime dark/light toggle. Raw head CSS is passed through verbatim.

  Dark is the default (:root). The toggle (theme-toggle.html) sets
  data-theme="light" on <html>; @media print forces light on white.
  Mirrors info521-activities-2026/shared/shell.css.
-->
<style>
  /* ---- Color tokens --------------------------------------------------- */
  :root {
    /* UA brand constants */
    --ua-navy: #1B4F72;
    --ua-red:  #AB0520;

    /* Dark mode (default) */
    --bg:      #1a1a1a;
    --surface: #2c2c2a;
    --text:    #e5e5e5;
    --muted:   #b4b2a9;
    --border:  #5f5e5a;
    --heading: #f2f1ee;
    --link:    #7fb2e6;   /* lightened navy — AA on dark */
    --accent:  #e3786b;   /* lightened red  — AA on dark */
    --code-bg: #24241f;
    --grid:    rgba(255, 255, 255, 0.10);

    /* Okabe-Ito data palette — identical hex to info521-activities-2026.
       Each hue is paired with a redundant non-color cue (line style / marker)
       in shared/slide_helpers.py so figures read in mono / colorblind. */
    --ok-blue:       #0072B2;
    --ok-vermillion: #D55E00;
    --ok-green:      #009E73;
    --ok-orange:     #E69F00;
    --ok-sky:        #56B4E9;
    --ok-yellow:     #F0E442;
    --ok-purple:     #CC79A7;
    --ok-black:      #000000;
  }

  :root[data-theme="light"] {
    --bg:      #f5f5f5;
    --surface: #ffffff;
    --text:    #2c2c2a;
    --muted:   #5f5e5a;
    --border:  #d3d1c7;
    --heading: var(--ua-navy);   /* navy headings — AA on light */
    --link:    var(--ua-navy);
    --accent:  var(--ua-red);    /* UA red accent — AA on light */
    --code-bg: #f1efe8;
    --grid:    rgba(0, 0, 0, 0.10);
    /* Okabe-Ito tokens inherit unchanged. */
  }

  /* ---- Bind reveal surfaces to the tokens (beat the `default` theme) --- */
  .reveal-viewport {
    background-color: var(--bg) !important;
    transition: background-color 0.2s ease;
  }

  .reveal {
    color: var(--text);
  }
  .reveal .slides section { text-align: left; }
  .reveal .slides section.center { text-align: center; }

  .reveal h1, .reveal h2, .reveal h3,
  .reveal h4, .reveal h5, .reveal h6 {
    color: var(--heading) !important;
    font-weight: 650;
    letter-spacing: -0.01em;
    text-transform: none;
  }

  /* Slide titles (slide-level 2) carry a brand accent rule. */
  .reveal h2 {
    border-bottom: 3px solid var(--accent);
    padding-bottom: 0.2em;
    margin-bottom: 0.6em;
  }

  .reveal a {
    color: var(--link) !important;
    text-decoration-color: color-mix(in srgb, var(--link) 55%, transparent);
  }
  .reveal a:hover { color: var(--accent) !important; }

  .reveal strong, .reveal b { color: var(--heading); }

  .reveal code, .reveal pre {
    background-color: var(--code-bg);
    color: var(--text);
    border-radius: 4px;
  }
  .reveal pre { border: 1px solid var(--border); }
  .reveal :not(pre) > code { padding: 0.1em 0.3em; }

  .reveal blockquote {
    border-left: 4px solid var(--ua-navy);
    background: var(--surface);
    color: var(--muted);
  }

  .reveal table th { color: var(--heading); border-bottom-color: var(--border); }
  .reveal table td { border-color: var(--border); }

  /* Pre-rendered SVG figures sit on either theme (transparent facecolor). */
  .reveal .quarto-figure, .reveal figure, .reveal img { background: transparent; }

  /* KaTeX inherits text color so math is crisp in both modes. */
  .reveal .katex { color: var(--text); }

  /* reveal chrome in brand tones */
  .reveal .progress { color: var(--accent); }
  .reveal .controls { color: var(--link); }
  .reveal .slide-number {
    background-color: color-mix(in srgb, var(--surface) 80%, transparent);
    color: var(--muted);
  }

  /* ---- Theme toggle button (markup from theme-toggle.html) ------------- */
  #info521-theme-toggle {
    position: fixed;
    bottom: 12px;
    left: 12px;
    z-index: 60;
    width: 38px;
    height: 38px;
    padding: 0;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    opacity: 0.55;
    transition: opacity 0.15s ease, background-color 0.2s ease, color 0.2s ease;
  }
  #info521-theme-toggle:hover { opacity: 1; }
  #info521-theme-toggle:focus-visible {
    opacity: 1;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal-viewport, #info521-theme-toggle { transition: none; }
  }

  /* ---- Print: force LIGHT on white, hide the toggle ------------------- */
  @media print {
    :root {
      --bg:      #ffffff;
      --surface: #ffffff;
      --text:    #1a1a1a;
      --muted:   #5f5e5a;
      --border:  #d3d1c7;
      --heading: var(--ua-navy);
      --link:    var(--ua-navy);
      --accent:  var(--ua-red);
      --code-bg: #f4f3ee;
      --grid:    rgba(0, 0, 0, 0.10);
    }
    .reveal-viewport, body, html { background: #ffffff !important; }
    .reveal, .reveal .slides section { color: #1a1a1a !important; }
    #info521-theme-toggle { display: none !important; }
  }
</style>

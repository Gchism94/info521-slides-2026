name: Publish site
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The slides project depends on a local editable package at ../info521-projects-2026
      # (the NHANES data loader). Check it out into the sibling path it expects.
      - name: Check out info521-projects-2026 (NHANES loader)
        uses: actions/checkout@v4
        with:
          repository: gchism94/info521-projects-2026
          path: ../info521-projects-2026
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: quarto-dev/quarto-actions/render@v2

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4

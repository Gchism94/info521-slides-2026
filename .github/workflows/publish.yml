name: Publish site
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    # Declare the Pages deployment environment explicitly — required for
    # deploy-pages to target the right environment (mirrors the working
    # activities-repo workflow; its absence produces "Deployment failed").
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # requirements.txt has `-e ../info521-projects-2026` (NHANES loader).
      # Actions workspace rules forbid path: ../ so we check out inside the
      # workspace and install from there instead of from the sibling path.
      - name: Check out info521-projects-2026 (NHANES loader)
        uses: actions/checkout@v4
        with:
          repository: gchism94/info521-projects-2026
          path: info521-projects-2026

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          grep -v 'info521-projects-2026' requirements.txt | pip install -r /dev/stdin
          pip install -e ./info521-projects-2026

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: quarto-dev/quarto-actions/render@v2

      # Register the Pages deployment before uploading (parity with the
      # activities workflow — resolves queued/failed deployments).
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deploy
